vxlan:
  topology:
    switches:
      - name: netascode4-ebgp-bl1
        serial_number: 9J5AFVH9TP1
        interfaces:
          - name: Ethernet1/3.2
            mode: routed_sub
            description: "NaC Routed for myvrf_50001 bl1 to extrtr"
            mtu: 9216
            speed: auto
            enabled: true
            ipv4_address: 10.31.95.31/24
            ipv6_address: 2001::31/64
            vrf: myvrf_50001
            dot1q_id: 2
      - name: netascode4-ebgp-bl2
        serial_number: 90XY4VEFWYX
        interfaces:
          - name: Ethernet1/3.2
            mode: routed_sub
            description: "NaC Routed for myvrf_50001 bl2 to extrtr"
            mtu: 9216
            speed: auto
            enabled: true
            ipv4_address: 10.31.96.31/24
            ipv6_address: 2001:aaa::31/64
            vrf: myvrf_50001
            dot1q_id: 2


